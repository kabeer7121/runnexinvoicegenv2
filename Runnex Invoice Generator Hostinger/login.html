<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Runnex Logistics Invoice Generator — Login</title>
  <link rel="icon" href="/assets/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/assets/favicon.png">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">RL</div>
      <span class="login-logo-text">RUNNEX LOGISTICS</span>
    </div>
    <h1 class="login-title">Welcome back</h1>
    <p class="login-sub">Runnex Logistics Invoice Generator — sign in to continue</p>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter password" required autocomplete="current-password">
        <label style="display:flex;align-items:center;gap:8px;margin-top:8px;font-size:12px;color:var(--text-muted);cursor:pointer">
          <input type="checkbox" id="login-show-password" onchange="toggleLoginPassword()"> Show password
        </label>
      </div>
      <div id="login-error" style="display:none;color:#ef4444;font-size:13px;margin-bottom:16px;padding:10px 12px;background:rgba(239,68,68,0.1);border-radius:8px;"></div>
      <button type="submit" class="btn btn-primary w-full btn-lg" id="login-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
        Sign In
      </button>
    </form>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
  api.get('/api/auth/me').then(u => { window.location.href = u.role==='admin'?'/admin':'/agent'; }).catch(()=>{});
  function toggleLoginPassword() {
    const pwd = document.getElementById('password');
    const show = document.getElementById('login-show-password');
    if (!pwd || !show) return;
    pwd.type = show.checked ? 'text' : 'password';
  }
  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Signing in...';
    try {
      const res = await api.post('/api/auth/login', { username: document.getElementById('username').value.trim(), password: document.getElementById('password').value });
      window.location.href = res.user.role==='admin'?'/admin':'/agent';
    } catch(err) {
      errEl.textContent = err.message; errEl.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg> Sign In';
    }
  });
</script>
</body>
</html>
